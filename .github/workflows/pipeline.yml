name: Pipeline

# Backend CI + CD as a single workflow per ADR 010 (revised).
#
# Previous approach used two workflows (ci.yml + deploy.yml) linked via
# workflow_run, but GitHub's workflow_run event had reliability issues
# (silently skipped runs after watcher registration). Merging into one
# workflow keeps the gating semantics (deploy requires lint/test/e2e/build
# green) while eliminating the workflow_run race.
#
# Deploy job runs only when:
#   - branch is main
#   - event is push (auto on merge) or workflow_dispatch (manual re-run)
#   - all four CI jobs passed (needs:)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

  # Deploy-only vars (consumed by the deploy job).
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: jko_backend
  # Existing wizard-created cluster from the healthcheck pilot; we keep this
  # name because ECS clusters cannot be renamed and recreating it just for
  # naming hygiene isn't worth the migration cost.
  ECS_CLUSTER: warmhearted-crocodile-18gqvo-jko-cluster
  ECS_SERVICE: jko-backend-service
  CONTAINER_NAME: jko-backend
  TASK_DEFINITION: .aws/task-definition.json

permissions:
  id-token: write
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    name: Unit / Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jkodonation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # NODE_ENV=development lets RATE_LIMIT_TRUSTED_PROXIES stay empty
    # (spec 001 §4.4 only enforces it in staging/production).
    env:
      NODE_ENV: development
      PORT: '3001'
      LOG_LEVEL: warn

      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: jkodonation_test
      DB_SCHEMA: public
      DATABASE_URL: postgresql://test:test@localhost:5432/jkodonation_test?schema=public

      REDIS_URL: redis://localhost:6379

      JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
      JWT_ISSUER: http://localhost:3001

      GOOGLE_CLIENT_ID: ci-test-google-client-id
      GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback

      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrate (if prisma is configured)
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma migrate deploy
          else
            echo "No prisma schema yet, skipping migrate"
          fi

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E (API integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jkodonation_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      PORT: '3001'
      LOG_LEVEL: warn

      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: jkodonation_e2e
      DB_SCHEMA: public
      DATABASE_URL: postgresql://test:test@localhost:5432/jkodonation_e2e?schema=public

      REDIS_URL: redis://localhost:6379

      JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
      JWT_ISSUER: http://localhost:3001

      GOOGLE_CLIENT_ID: ci-test-google-client-id
      GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback

      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrate (if prisma is configured)
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma migrate deploy
          fi

      - name: Run E2E tests
        run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ───────────────────────────────────────────────────────────────────────
  # Deploy to ECS Fargate (per ADR 008 / 010).
  # Only on main + after all CI jobs pass.
  # PRs skip (event != push), feature branches skip (ref != main).
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: [lint-typecheck, test, e2e, build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          if aws ecr describe-images \
               --repository-name "$ECR_REPOSITORY" \
               --image-ids "imageTag=$IMAGE_TAG" \
               --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Image $IMAGE already in ECR, skipping build & push (idempotent re-run)"
          else
            docker build \
              --build-arg BUILD_GIT_SHA="$IMAGE_TAG" \
              --build-arg BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --build-arg BUILD_VERSION="$IMAGE_TAG" \
              -t "$IMAGE" .
            docker push "$IMAGE"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Substitute task definition placeholders
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          EC2_PRIVATE_IP: ${{ vars.EC2_PRIVATE_IP }}
        run: |
          sed -i "s|REPLACE_ACCOUNT_ID|${AWS_ACCOUNT_ID}|g" "$TASK_DEFINITION"
          sed -i "s|REPLACE_EC2_PRIVATE_IP|${EC2_PRIVATE_IP}|g" "$TASK_DEFINITION"

      - name: Render task definition (inject image)
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      # Register the rendered task definition ONCE and capture its ARN.
      # Both the migration RunTask and the eventual UpdateService reuse this
      # ARN, so we don't create two near-identical revisions per deploy.
      - name: Register task definition
        id: register
        env:
          RENDERED: ${{ steps.render.outputs.task-definition }}
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$RENDERED" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "Registered: $TASK_DEF_ARN"
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      # ───────────────────────────────────────────────────────────────────
      # Run Prisma `migrate deploy` as a one-shot Fargate task BEFORE the
      # rolling deploy. The task reuses backend's image (prisma CLI is in
      # production dependencies — see ADR 010 §4) but overrides the
      # container command to run migrations against the EC2 Postgres over
      # the VPC private network.
      #
      # If migration fails (non-zero exit), the job aborts here and the
      # ECS service stays on the old task definition. Application code is
      # never deployed against a DB it hasn't migrated to.
      # ───────────────────────────────────────────────────────────────────
      - name: Run Prisma migrate (one-shot ECS task)
        id: migrate
        env:
          TASK_DEF_ARN: ${{ steps.register.outputs.arn }}
          ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
          BACKEND_TASK_SG: ${{ vars.BACKEND_TASK_SG }}
        run: |
          # Compose DATABASE_URL from discrete DB_* env at runtime (spec 001 §4 —
          # DB_* is single source of truth; DATABASE_URL is derived). prisma CLI
          # reads DATABASE_URL directly so the application's composeDatabaseUrl
          # helper is bypassed in this code path.
          # \$VARS are escaped from the heredoc so they're expanded inside the
          # container's sh, not by the GHA runner.
          OVERRIDES=$(cat <<EOF
          {
            "containerOverrides": [
              {
                "name": "$CONTAINER_NAME",
                "command": [
                  "sh",
                  "-c",
                  "export DATABASE_URL=\"postgresql://\$DB_USER:\$DB_PASSWORD@\$DB_HOST:\$DB_PORT/\$DB_NAME?schema=\$DB_SCHEMA\" && npx prisma migrate deploy"
                ]
              }
            ]
          }
          EOF
          )

          NETWORK_CFG="awsvpcConfiguration={subnets=[$ECS_SUBNETS],securityGroups=[$BACKEND_TASK_SG],assignPublicIp=DISABLED}"

          RUN_TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CFG" \
            --overrides "$OVERRIDES" \
            --started-by "gha-migrate-${GITHUB_RUN_ID}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Migration task: $RUN_TASK_ARN"
          echo "arn=$RUN_TASK_ARN" >> "$GITHUB_OUTPUT"

          echo "::group::Waiting for migration task to stop"
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$RUN_TASK_ARN"
          echo "::endgroup::"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$RUN_TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          REASON=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$RUN_TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          echo "Migration stop reason: $REASON"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Prisma migration failed (exit=$EXIT_CODE, reason=$REASON). See /ecs/jko-backend log group for details."
            exit 1
          fi

      # UpdateService with the SAME task definition ARN the migration ran
      # against. force-new-deployment ensures ECS pulls the new revision
      # even when the ARN hasn't changed in some edge cases.
      - name: Update ECS service (rolling deploy)
        env:
          TASK_DEF_ARN: ${{ steps.register.outputs.arn }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_DEF_ARN" \
            --force-new-deployment >/dev/null

          echo "::group::Waiting for service to stabilise"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "::endgroup::"

          echo "Deployment complete: $TASK_DEF_ARN"
