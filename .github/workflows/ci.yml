name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck:
    name: Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    name: Unit / Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jkodonation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # NODE_ENV=development lets RATE_LIMIT_TRUSTED_PROXIES stay empty
    # (spec 001 §4.4 only enforces it in staging/production).
    env:
      NODE_ENV: development
      PORT: '3001'
      LOG_LEVEL: warn

      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: jkodonation_test
      DB_SCHEMA: public
      DATABASE_URL: postgresql://test:test@localhost:5432/jkodonation_test?schema=public

      REDIS_URL: redis://localhost:6379

      JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
      JWT_ISSUER: http://localhost:3001

      GOOGLE_CLIENT_ID: ci-test-google-client-id
      GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback

      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrate (if prisma is configured)
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma migrate deploy
          else
            echo "No prisma schema yet, skipping migrate"
          fi

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E (API integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jkodonation_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      PORT: '3001'
      LOG_LEVEL: warn

      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: jkodonation_e2e
      DB_SCHEMA: public
      DATABASE_URL: postgresql://test:test@localhost:5432/jkodonation_e2e?schema=public

      REDIS_URL: redis://localhost:6379

      JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
      JWT_ISSUER: http://localhost:3001

      GOOGLE_CLIENT_ID: ci-test-google-client-id
      GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback

      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrate (if prisma is configured)
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma migrate deploy
          fi

      - name: Run E2E tests
        run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
